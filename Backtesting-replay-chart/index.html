<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Backtesting Replay Chart</title><script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script><style>*{box-sizing:border-box}body{margin:0;background:#050913;color:#dbe7ff;font-family:Arial,sans-serif}button,input,select{font:inherit}button{cursor:pointer}.app{height:100vh;padding:10px;display:grid;grid-template-rows:auto 1fr;gap:10px}.top{background:#0b1220;border:1px solid #1b2942;border-radius:14px;padding:10px;display:flex;justify-content:space-between;gap:10px}.top h1{margin:0;font-size:18px}.top p{margin:4px 0 0;color:#7d8ba3;font-size:12px}.stats{display:flex;gap:8px}.stat{background:#07101f;border:1px solid #1b2942;border-radius:10px;padding:7px;min-width:90px}.stat span{display:block;color:#7d8ba3;font-size:11px}.grid{min-height:0;display:grid;grid-template-columns:210px 1fr 300px;gap:10px}.panel{background:#0b1220;border:1px solid #1b2942;border-radius:14px;overflow:hidden}.side{padding:10px;overflow:auto}.side h2{font-size:12px;color:#8fa3bf;text-transform:uppercase;letter-spacing:.08em}.market,.tf,.ctrl button,.ctrl select{border:1px solid #1b2942;background:#08111f;color:#dbe7ff;border-radius:10px;padding:8px}.market{width:100%;display:block;text-align:left;margin-bottom:7px}.active{border-color:#38bdf8!important;background:#0f2c48!important}.tfs{display:grid;grid-template-columns:1fr 1fr;gap:7px}.chartPanel{display:grid;grid-template-rows:auto auto 1fr}.head{padding:10px;border-bottom:1px solid #1b2942;display:flex;justify-content:space-between;gap:10px}.head h2{margin:0}.green{color:#22c55e}.red{color:#ef4444}.pill{border-radius:99px;padding:4px 8px;font-size:12px;font-weight:700}.pill.green{background:rgba(34,197,94,.12)}.pill.red{background:rgba(239,68,68,.12)}.ohlc{color:#8fa3bf;font-size:13px;margin-top:5px}.ctrl{display:flex;gap:7px;flex-wrap:wrap;justify-content:flex-end}.prog{padding:8px 10px;border-bottom:1px solid #1b2942;display:flex;gap:8px}.prog input{width:100%;accent-color:#38bdf8}#chart{width:100%;height:100%}.ticket{padding:10px}.ticket input{width:100%;background:#08111f;color:#dbe7ff;border:1px solid #1b2942;border-radius:10px;padding:8px}.btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}.buy,.sell,.close{border:0;border-radius:10px;color:white;font-weight:800;padding:10px}.buy{background:#16a34a}.sell{background:#dc2626}.close{background:#2563eb;width:100%;margin-top:8px}.right{display:grid;grid-template-rows:auto 1fr;gap:10px}.journal{padding:10px;overflow:auto}.trade{border:1px solid #1b2942;background:#08111f;border-radius:10px;padding:8px;margin-bottom:7px;display:flex;justify-content:space-between;gap:8px}.small{color:#7d8ba3;font-size:12px}@media(max-width:900px){.grid{grid-template-columns:1fr}.app{height:auto}.chartPanel{height:65vh}.top{flex-direction:column}.side{display:grid;grid-template-columns:1fr 1fr;gap:10px}}</style></head><body><div class="app"><div class="top"><div><h1>Backtesting Replay Chart</h1><p>TradingView-like replay and trade journal</p></div><div class="stats"><div class="stat"><span>Trades</span><b id="tradesN">0</b></div><div class="stat"><span>Win rate</span><b id="win">0%</b></div><div class="stat"><span>PnL</span><b id="pnl" class="green">0.00</b></div></div></div><div class="grid"><aside class="panel side"><div><h2>Markets</h2><div id="markets"></div></div><div><h2>Timeframe</h2><div class="tfs" id="tfs"></div></div></aside><section class="panel chartPanel"><div class="head"><div><h2 id="title">BTCUSDT</h2><span id="chg" class="pill green">0</span><div id="ohlc" class="ohlc"></div></div><div class="ctrl"><button id="play">Play</button><button id="step">Step</button><button id="reset">Reset</button><select id="speed"><option>1</option><option selected>2</option><option>5</option><option>10</option></select></div></div><div class="prog"><input id="range" type="range" min="50" max="800" value="120"><span id="pos">120/800</span></div><div id="chart"></div></section><aside class="right"><div class="panel ticket"><h2>Trade Ticket</h2><label class="small">Quantity</label><input id="qty" type="number" value="1" step="0.01"><div class="btns"><button id="buy" class="buy">Buy</button><button id="sell" class="sell">Sell</button></div><button id="close" class="close" disabled>Close</button><div id="open"></div></div><div class="panel journal"><h2>Journal</h2><div id="journal" class="small">No trades yet.</div></div></aside></div></div><script>const syms=[['BTCUSDT',64000,7],['ETHUSDT',3200,11],['SOLUSDT',145,17],['EURUSD',1.08,23],['XAUUSD',2350,31]],tfs=['1m','5m','15m','1h','4h'];let sym='BTCUSDT',tf='15m',cur=120,play=false,timer=null,trades=[];const rnd=s=>{let x=Math.sin(s)*10000;return x-Math.floor(x)},fmt=v=>v<10?v.toFixed(5):v.toLocaleString('en-US',{maximumFractionDigits:2});function time(i){let step={"1m":1,"5m":5,"15m":15,"1h":60,"4h":240}[tf]||15,d=new Date('2025-01-01T00:00:00Z');d.setMinutes(d.getMinutes()+i*step);return Math.floor(d/1000)}function gen(){let c=syms.find(x=>x[0]==sym)||syms[0],p=c[1],a=[];for(let i=0;i<800;i++){let o=p,n=(rnd(c[2]+i*13)-.5)*p*.004,w=Math.sin(i/21)*p*.0009,cl=Math.max(.0001,o+n+w),sp=Math.abs(cl-o)+p*.002,h=Math.max(o,cl)+sp*rnd(i+3),l=Math.min(o,cl)-sp*rnd(i+5);a.push({time:time(i),open:+o.toFixed(p<10?5:2),high:+h.toFixed(p<10?5:2),low:+l.toFixed(p<10?5:2),close:+cl.toFixed(p<10?5:2),volume:Math.round(1000+rnd(i+c[2])*1e5)});p=cl}return a}let data=gen();const chart=LightweightCharts.createChart(document.getElementById('chart'),{autoSize:true,layout:{background:{color:'#070b13'},textColor:'#b6c2d9'},grid:{vertLines:{color:'rgba(148,163,184,.08)'},horzLines:{color:'rgba(148,163,184,.08)'}},rightPriceScale:{scaleMargins:{top:.08,bottom:.22}},timeScale:{timeVisible:true}}),cs=chart.addSeries(LightweightCharts.CandlestickSeries,{upColor:'#22c55e',downColor:'#ef4444',wickUpColor:'#22c55e',wickDownColor:'#ef4444',borderVisible:false}),vs=chart.addSeries(LightweightCharts.HistogramSeries,{priceScaleId:'',priceFormat:{type:'volume'},lastValueVisible:false,priceLineVisible:false});vs.priceScale().applyOptions({scaleMargins:{top:.8,bottom:0}});function render(){let v=data.slice(0,cur);cs.setData(v.map(({volume,...x})=>x));vs.setData(v.map(x=>({time:x.time,value:x.volume,color:x.close>=x.open?'rgba(34,197,94,.28)':'rgba(239,68,68,.28)'})));chart.timeScale().fitContent();let c=v.at(-1),p=v.at(-2)||c,ch=c.close-p.close,pc=ch/p.close*100;title.textContent=sym;chg.className='pill '+(ch>=0?'green':'red');chg.textContent=(ch>=0?'+':'')+fmt(ch)+' / '+pc.toFixed(2)+'%';ohlc.textContent=`O ${fmt(c.open)} · H ${fmt(c.high)} · L ${fmt(c.low)} · C ${fmt(c.close)}`;pos.textContent=cur+'/800';range.value=cur;renderTrades()}function controls(){markets.innerHTML=syms.map(x=>`<button class="market ${x[0]==sym?'active':''}" data-s="${x[0]}"><b>${x[0]}</b><br><span class="small">${fmt(x[1])}</span></button>`).join('');document.querySelectorAll('[data-s]').forEach(b=>b.onclick=()=>{sym=b.dataset.s;data=gen();cur=120;trades=[];stop();controls();render()});tfs.innerHTML=tfs.map(x=>`<button class="tf ${x==tf?'active':''}" data-t="${x}">${x}</button>`).join('');document.querySelectorAll('[data-t]').forEach(b=>b.onclick=()=>{tf=b.dataset.t;data=gen();cur=120;trades=[];stop();controls();render()})}function stop(){play=false;clearInterval(timer);playBtn.textContent='Play'}const playBtn=document.getElementById('play');playBtn.onclick=()=>{play=!play;playBtn.textContent=play?'Pause':'Play';clearInterval(timer);if(play)timer=setInterval(()=>{cur=Math.min(800,cur+1);render();if(cur>=800)stop()},Math.max(80,700/+speed.value))};step.onclick=()=>{cur=Math.min(800,cur+1);render()};reset.onclick=()=>{stop();cur=120;trades=[];render()};range.oninput=e=>{cur=+e.target.value;render()};function stats(){let closed=trades.filter(x=>x.status=='closed'),sum=closed.reduce((s,t)=>s+t.pnl,0),wins=closed.filter(t=>t.pnl>0).length;tradesN.textContent=closed.length;win.textContent=(closed.length?wins/closed.length*100:0).toFixed(1)+'%';pnl.textContent=sum.toFixed(2);pnl.className=sum>=0?'green':'red'}function renderTrades(){let op=trades.find(x=>x.status=='open');close.disabled=!op;buy.disabled=!!op;sell.disabled=!!op;open.innerHTML=op?`<div class="trade"><span>Open ${op.side}</span><b>${fmt(op.entry)}</b></div>`:'';journal.innerHTML=trades.length?trades.map(t=>`<div class="trade"><div><b class="${t.side=='long'?'green':'red'}">${t.side.toUpperCase()} ${t.symbol}</b><br><span class="small">${t.entryTime}</span></div><div>${fmt(t.entry)} ${t.exit?'→ '+fmt(t.exit):''}<br><b class="${(t.pnl||0)>=0?'green':'red'}">${t.status=='open'?'OPEN':t.pnl.toFixed(2)}</b></div></div>`).join(''):'No trades yet.';stats()}function openTrade(side){let c=data[cur-1];if(trades.find(x=>x.status=='open'))return;trades.unshift({side,symbol:sym,entry:c.close,qty:+qty.value||1,entryTime:new Date(c.time*1000).toLocaleString(),status:'open'});renderTrades()}buy.onclick=()=>openTrade('long');sell.onclick=()=>openTrade('short');close.onclick=()=>{let t=trades.find(x=>x.status=='open'),c=data[cur-1];if(!t)return;t.exit=c.close;t.pnl=+(((t.side=='long'?c.close-t.entry:t.entry-c.close)*t.qty).toFixed(2));t.status='closed';renderTrades()};controls();render();</script></body></html>
